<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Calculator</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background-image: url("background.jpg"); /* your background image */
      background-size: cover;
      background-position: center;
      font-family: Arial, sans-serif;
    }

    .calculator {
      background: #bde5ff;
      padding: 20px;
      border-radius: 20px;
      width: 280px;
      box-shadow: 0 0 10px rgba(0,0,0,0.3);
    }

    input {
      width: 100%;
      height: 50px;
      font-size: 22px;
      margin-bottom: 15px;
      padding: 5px;
      border-radius: 10px;
      border: none;
      text-align: right;
    }

    .row {
      display: flex;
      justify-content: space-between;
      margin-bottom: 10px;
    }

    button {
      width: 60px;
      height: 45px;
      font-size: 18px;
      border-radius: 10px;
      border: none;
      cursor: pointer;
    }

    .operator {
      background: #9fd3f3;
    }

    .number {
      background: #ffffff;
    }

    .action {
      width: 48%;
      background: #9fd3f3;
    }
  </style>
</head>

<body>

  <div class="calculator">
    <input type="text" id="display" readonly>

    <div class="row">
      <button class="operator" onclick="append('+')">+</button>
      <button class="operator" onclick="append('-')">-</button>
      <button class="operator" onclick="append('*')">*</button>
      <button class="operator" onclick="append('/')">/</button>
    </div>

    <div class="row">
      <button class="number" onclick="append('0')">0</button>
      <button class="number" onclick="append('5')">5</button>
      <button class="number" onclick="append('10')">10</button>
      <button class="number" onclick="append('15')">15</button>
    </div>

    <div class="row">
      <button class="action" onclick="clearDisplay()">Clear</button>
      <button class="action" onclick="calculate()">Enter</button>
    </div>
  </div>

  <script>
    function append(value) {
      document.getElementById("display").value += value;
    }

    function clearDisplay() {
      document.getElementById("display").value = "";
    }

    function calculate() {
        try {
        document.getElementById("display").value =
          eval(document.getElementById("display").value);
      } catch {
        alert("Invalid Expression");
      }
      
    }
  </script>

</body>
</html>
